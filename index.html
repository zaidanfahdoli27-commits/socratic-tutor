<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Socratic Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #1e3a8a, #0f172a);
            height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-bubble-ai {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #38bdf8;
            color: #e2e8f0;
        }
        .chat-bubble-user {
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- Kontainer Utama -->
    <div class="w-full max-w-2xl h-[90vh] flex flex-col">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-sky-400 tracking-tight">SOCRATIC AI</h1>
            <p class="text-slate-400 text-sm italic">"Pikiran bukanlah wadah untuk diisi, melainkan api untuk dinyalakan."</p>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 glass-card rounded-2xl mb-4 custom-scrollbar flex flex-col gap-4">
            <div class="chat-bubble-ai p-4 rounded-xl max-w-[85%] self-start shadow-sm">
                Halo! Saya tutor Sokratik Anda. Beri tahu saya konsep apa yang ingin Anda kuasai hari ini?
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden mb-2 ml-2">
            <div class="flex items-center gap-2 text-sky-400 text-xs animate-pulse">
                <i class="fas fa-brain"></i> <span>Tutor sedang merangkai pertanyaan...</span>
            </div>
        </div>

        <!-- Input -->
        <div class="glass-card p-2 rounded-2xl flex gap-2 border border-white/20">
            <input type="text" id="userInput" placeholder="Tanyakan kesulitan belajarmu..." 
                   class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-white placeholder-slate-500">
            <button onclick="askAI()" class="bg-sky-500 hover:bg-sky-400 text-white w-12 h-12 rounded-xl transition-all flex items-center justify-center">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // API KEY Anda sudah terpasang di bawah ini
        const API_KEY = "AIzaSyASjT4cebLBQ5IEQEx2zUAGU6vYwsKUHwo"; 

        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const loading = document.getElementById('loading');
            const userText = input.value.trim();

            if (!userText) return;

            // Tampilkan Pesan User
            chatBox.innerHTML += `<div class="self-end max-w-[85%]"><div class="chat-bubble-user p-4 rounded-xl shadow-lg">${userText}</div></div>`;
            input.value = "";
            loading.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Anda adalah Socratic Tutor. Instruksi:
                            1. JANGAN PERNAH memberikan jawaban langsung, solusi matematika akhir, atau definisi kamus.
                            2. Selalu balas dengan pertanyaan yang membimbing langkah demi langkah.
                            3. Jika siswa salah, jangan katakan 'Salah', tapi tanyakan 'Bagaimana jika kita lihat dari sudut pandang X?'.
                            4. Gunakan bahasa Indonesia yang santun dan memotivasi.
                            Siswa bertanya: ${userText}` }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                loading.classList.add('hidden');
                chatBox.innerHTML += `<div class="chat-bubble-ai p-4 rounded-xl max-w-[85%] self-start shadow-inner leading-relaxed">${aiText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                loading.classList.add('hidden');
                console.error(error);
                alert("Waduh, koneksi ke otak AI terputus. Pastikan API Key valid!");
            }
        }

        // Fitur tekan Enter untuk kirim
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
