<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socratic Tutor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top, #1e3a8a, #0f172a);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-bubble-ai {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #38bdf8;
        }
        .chat-bubble-user {
            background: #38bdf8;
            color: #0f172a;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <div class="max-w-3xl mx-auto h-screen flex flex-col p-4">
        <!-- Header -->
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-sky-400"><i class="fas fa-brain mr-2"></i>Socratic Tutor</h1>
            <p class="text-sm text-slate-400 mt-1">Berpikir lebih dalam, temukan jawaban secara mandiri.</p>
        </header>

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 p-4 glass-card rounded-2xl mb-4">
            <div class="chat-bubble-ai p-4 rounded-xl max-w-[85%]">
                Halo! Saya tutor pendampingmu. Apa tantangan belajar yang ingin kita bedah bersama hari ini?
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden mb-4 ml-4">
            <span class="inline-flex items-center text-sky-400 text-sm animate-pulse">
                <i class="fas fa-circle-notch fa-spin mr-2"></i> Tutor sedang menyusun pertanyaan...
            </span>
        </div>

        <!-- Input Area -->
        <div class="glass-card p-2 rounded-2xl flex items-center gap-2">
            <input type="text" id="userInput" placeholder="Ketik topik atau kesulitanmu..." 
                   class="flex-1 bg-transparent border-none outline-none px-4 py-3 text-white placeholder-slate-500">
            <button onclick="askAI()" class="bg-sky-500 hover:bg-sky-400 text-slate-900 font-bold p-3 rounded-xl transition-all shadow-lg shadow-sky-500/20">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <!-- API Key Hint -->
        <p class="text-[10px] text-center mt-3 text-slate-500 uppercase tracking-widest">Powered by Google Gemini AI</p>
    </div>

    <script>
        // MASUKKAN API KEY ANDA DI SINI
        const API_KEY = "AIzaSyASjT4cebLBQ5IEQEx2zUAGU6vYwsKUHwo"; 

        async function askAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const loading = document.getElementById('loading');
            const userText = input.value.trim();

            if (!userText) return;
            if (API_KEY === "AIzaSyASjT4cebLBQ5IEQEx2zUAGU6vYwsKUHwo") {
                alert("Harap masukkan API Key Gemini Anda di dalam kode!");
                return;
            }

            // Tampilkan pesan User
            chatBox.innerHTML += `<div class="flex justify-end"><div class="chat-bubble-user p-4 rounded-xl max-w-[85%] font-medium shadow-md">${userText}</div></div>`;
            input.value = "";
            loading.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Nama Anda adalah Socratic Tutor. Karakter: Bijak, sabar, dan menantang pikiran. Tugas: Membantu siswa menemukan jawaban SENDIRI. ATURAN: 1. Jangan berikan jawaban akhir. 2. Jika ditanya rumus, ajak siswa memahami asal-usulnya. 3. Berikan pertanyaan pemicu yang logis. Pertanyaan Siswa: ${userText}` }]
                        }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                loading.classList.add('hidden');
                chatBox.innerHTML += `<div class="chat-bubble-ai p-4 rounded-xl max-w-[85%] leading-relaxed">${aiText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                loading.classList.add('hidden');
                alert("Gagal terhubung ke AI. Periksa API Key Anda.");
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
